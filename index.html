<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoQueue — Job Processing Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b; --surface: #111114; --surface2: #18181d;
    --border: #252530; --border2: #2e2e3a;
    --text: #e8e8f0; --muted: #6b6b80;
    --accent: #00ff88; --accent2: #0088ff;
    --warn: #ffaa00; --danger: #ff4466; --purple: #9966ff;
    --font-mono: 'Space Mono', monospace; --font-sans: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); background: rgba(10,10,11,0.95); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 14px; color: #000; font-weight: 700; }
  .logo-text { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .logo-text span { color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-pill { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border2); font-family: var(--font-mono); font-size: 11px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  .dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)} }
  .main { max-width: 1300px; margin: 0 auto; padding: 40px; }
  .hero { margin-bottom: 40px; }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border: 1px solid var(--border2); border-radius: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.05em; }
  .hero h1 { font-family: var(--font-mono); font-size: clamp(26px, 4vw, 44px); font-weight: 700; line-height: 1.1; letter-spacing: -1px; margin-bottom: 12px; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); font-size: 15px; max-width: 580px; line-height: 1.7; }
  .explainer { background: linear-gradient(135deg, rgba(0,255,136,0.06), rgba(0,136,255,0.06)); border: 1px solid rgba(0,255,136,0.2); border-radius: 16px; padding: 28px 32px; margin-bottom: 40px; }
  .explainer h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
  .explainer p { font-size: 14px; color: #b0b0c8; line-height: 1.7; max-width: 800px; }
  .explainer-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 20px; }
  @media(max-width:700px){ .explainer-cards { grid-template-columns:1fr; } }
  .explainer-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; }
  .explainer-card-icon { font-size: 22px; margin-bottom: 8px; }
  .explainer-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .explainer-card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .how-it-works { margin-bottom: 40px; }
  .steps-row { display: flex; align-items: center; gap: 0; overflow-x: auto; padding-bottom: 8px; }
  .step { display: flex; flex-direction: column; align-items: center; min-width: 120px; }
  .step-num { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .step-label { font-size: 12px; color: var(--text); text-align: center; font-weight: 500; }
  .step-sub { font-size: 10px; color: var(--muted); text-align: center; margin-top: 3px; max-width: 100px; line-height: 1.4; }
  .step-arrow { font-size: 18px; color: var(--border2); margin: 0 4px; padding-bottom: 28px; flex-shrink: 0; }
  .stats-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; margin-bottom: 16px; }
  @media(max-width:900px){ .stats-grid { grid-template-columns:repeat(3,1fr); } }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent-color, var(--accent)); opacity:0.8; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; color: var(--accent-color, var(--accent)); line-height: 1; }
  .stat-desc { font-size: 10px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
  .workers-section { margin-bottom: 40px; }
  .workers-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .workers-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .workers-top-left h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .workers-top-left p { font-size: 12px; color: var(--muted); }
  .workers-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .worker-node { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .worker-circle { width: 48px; height: 48px; border-radius: 12px; background: var(--surface2); border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--muted); transition: all 0.3s; }
  .worker-circle.active { background: rgba(0,255,136,0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 16px rgba(0,255,136,0.25); animation: workerPulse 1.5s infinite; }
  .worker-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
  .worker-status { font-size: 10px; color: var(--accent); }
  @keyframes workerPulse { 0%,100%{box-shadow:0 0 16px rgba(0,255,136,0.25)}50%{box-shadow:0 0 28px rgba(0,255,136,0.5)} }
  .two-col { display: grid; grid-template-columns: 400px 1fr; gap: 24px; margin-bottom: 24px; }
  @media(max-width:900px){ .two-col { grid-template-columns:1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
  .panel-title { font-family: var(--font-mono); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .panel-title-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .panel-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .panel-body { padding: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .form-hint { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
  .form-control { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; transition: border-color 0.2s; appearance: none; }
  .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,136,0.1); }
  .form-control option { background: var(--surface2); }
  .payload-area { min-height: 90px; resize: vertical; line-height: 1.5; }
  .priority-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:hover { background: #00e07a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,255,136,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-demo { width: 100%; padding: 11px; background: transparent; color: var(--warn); border: 1px dashed var(--warn); border-radius: 8px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
  .btn-demo:hover { background: rgba(255,170,0,0.08); transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border2); padding: 6px 14px; width: auto; font-size: 11px; font-family: var(--font-mono); border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  .job-result { margin-top: 16px; padding: 14px; background: rgba(0,255,136,0.07); border: 1px solid rgba(0,255,136,0.25); border-radius: 8px; font-size: 12px; line-height: 1.7; }
  .job-result-title { font-weight: 600; color: var(--accent); margin-bottom: 6px; font-size: 13px; }
  .job-result-row { display: flex; gap: 8px; }
  .job-result-key { color: var(--muted); min-width: 80px; }
  .job-result-val { color: var(--text); font-family: var(--font-mono); font-size: 11px; word-break: break-all; }
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-tab { padding: 5px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--muted); transition: all 0.15s; }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .table-scroll { overflow-x: auto; }
  .jobs-table { width: 100%; border-collapse: collapse; }
  .jobs-table th { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .jobs-table td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .jobs-table tr:last-child td { border-bottom: none; }
  .jobs-table tr:hover td { background: var(--surface2); }
  .job-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .job-type { font-family: var(--font-mono); font-size: 12px; color: var(--accent2); }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 4px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
  .badge.completed { background: rgba(0,255,136,0.12); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
  .badge.pending { background: rgba(255,170,0,0.12); color: var(--warn); border: 1px solid rgba(255,170,0,0.3); }
  .badge.processing { background: rgba(0,136,255,0.12); color: var(--accent2); border: 1px solid rgba(0,136,255,0.3); animation: processingPulse 1s infinite; }
  .badge.failed { background: rgba(255,68,102,0.12); color: var(--danger); border: 1px solid rgba(255,68,102,0.3); }
  .badge.dead { background: rgba(153,102,255,0.12); color: var(--purple); border: 1px solid rgba(153,102,255,0.3); }
  @keyframes processingPulse { 0%,100%{opacity:1}50%{opacity:0.6} }
  .priority-badge { display: inline-block; width: 22px; height: 22px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-align: center; line-height: 22px; }
  .priority-1 { background: rgba(107,107,128,0.2); color: var(--muted); }
  .priority-2 { background: rgba(255,170,0,0.15); color: var(--warn); }
  .priority-3 { background: rgba(255,68,102,0.15); color: var(--danger); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .log-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 24px; }
  .log-body { padding: 16px 20px; height: 180px; overflow-y: auto; font-family: var(--font-mono); font-size: 11px; line-height: 1.9; }
  .log-body::-webkit-scrollbar { width: 4px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .log-entry { display: flex; gap: 12px; }
  .log-time { color: var(--muted); white-space: nowrap; }
  .log-msg.success { color: var(--accent); }
  .log-msg.info { color: var(--accent2); }
  .log-msg.warn { color: var(--warn); }
  .log-msg.error { color: var(--danger); }
  .usecases { margin-bottom: 40px; }
  .usecases-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  @media(max-width:700px){ .usecases-grid { grid-template-columns:1fr; } }
  .usecase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; transition: border-color 0.2s, transform 0.2s; }
  .usecase-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .usecase-icon { font-size: 28px; margin-bottom: 10px; }
  .usecase-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .usecase-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .usecase-example { margin-top: 10px; padding: 8px 12px; background: var(--surface2); border-radius: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--accent2); }
  .tech-section { margin-bottom: 40px; }
  .tech-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .tech-chip { padding: 6px 16px; background: var(--surface); border: 1px solid var(--border2); border-radius: 999px; font-family: var(--font-mono); font-size: 11px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .tech-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 18px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; max-width: 320px; }
  .toast.success { background: rgba(0,255,136,0.15); border: 1px solid var(--accent); color: var(--accent); }
  .toast.error { background: rgba(255,68,102,0.15); border: 1px solid var(--danger); color: var(--danger); }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} }
  .section-title { font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .auto-refresh-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  .footer { text-align: center; padding: 32px 40px; border-top: 1px solid var(--border); }
  .footer-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted); line-height: 1.9; }
  .footer-text a { color: var(--accent); text-decoration: none; }
  .footer-text a:hover { text-decoration: underline; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp 0.5s ease forwards; }
  .fade-up-1 { animation-delay:0.05s; opacity:0; }
  .fade-up-2 { animation-delay:0.15s; opacity:0; }
  .fade-up-3 { animation-delay:0.25s; opacity:0; }
  .fade-up-4 { animation-delay:0.35s; opacity:0; }
  .fade-up-5 { animation-delay:0.45s; opacity:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = "https://go-job-queue.onrender.com";

const JOB_TYPES = [
  { value: "send_email", label: "📧 Send Email", desc: "Sends an email to a recipient in the background without blocking the app", defaultPayload: '{"to": "user@example.com", "subject": "Welcome to GoQueue!"}' },
  { value: "generate_report", label: "📊 Generate Report", desc: "Creates a data report without slowing down the app", defaultPayload: '{"report_type": "monthly_sales"}' },
  { value: "webhook_delivery", label: "🔗 Webhook Delivery", desc: "Sends data to an external URL (e.g. HubSpot, Slack)", defaultPayload: '{"url": "https://example.com/webhook"}' },
];

const PRIORITY_LABELS = { "1": "🟢 Low — Process when free", "2": "🟡 Medium — Process soon", "3": "🔴 High — Process immediately" };

const DEMO_SCENARIOS = [
  { label: "📧 Email Demo", type: "send_email", payload: '{"to": "recruiter@company.com", "subject": "New Lead Qualified!", "body": "A high priority lead has been scored 92/100"}', priority: "3", attempts: "3" },
  { label: "📊 Report Demo", type: "generate_report", payload: '{"report_type": "quarterly_revenue", "format": "pdf", "email_on_complete": true}', priority: "2", attempts: "3" },
  { label: "🔗 Webhook Demo", type: "webhook_delivery", payload: '{"url": "https://hooks.slack.com/services/demo", "event": "order_placed", "order_id": "ORD-9821"}', priority: "2", attempts: "5" },
];

function formatTime(iso) { if (!iso) return "—"; return new Date(iso).toLocaleTimeString(); }
function shortId(id) { return id ? id.slice(0,8)+"…" : "—"; }

function App() {
  const [stats, setStats] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [online, setOnline] = useState(null);
  const [filter, setFilter] = useState("all");
  const [logs, setLogs] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeWorkers, setActiveWorkers] = useState([false,false,false,false,false]);
  const [lastJob, setLastJob] = useState(null);
  const logRef = useRef(null);

  const [jobType, setJobType] = useState("send_email");
  const [payload, setPayload] = useState(JOB_TYPES[0].defaultPayload);
  const [priority, setPriority] = useState("2");
  const [maxAttempts, setMaxAttempts] = useState("3");

  const addLog = useCallback((msg, type="info") => {
    const time = new Date().toLocaleTimeString();
    setLogs(prev => [...prev.slice(-49), {time, msg, type}]);
  }, []);

  const addToast = useCallback((msg, type="success") => {
    const id = Date.now();
    setToasts(prev => [...prev, {id, msg, type}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  }, []);

  const fetchStats = useCallback(async () => {
    try {
      const res = await fetch(`${API}/api/v1/stats`);
      if (res.ok) {
        const data = await res.json();
        setStats(data); setOnline(true);
        setActiveWorkers(Array.from({length:5}, (_,i) => i < (data.processing_jobs||0)));
      }
    } catch { setOnline(false); }
  }, []);

  const fetchJobs = useCallback(async () => {
    try {
      const url = filter==="all" ? `${API}/api/v1/jobs?limit=20` : `${API}/api/v1/jobs?status=${filter}&limit=20`;
      const res = await fetch(url);
      if (res.ok) { const data = await res.json(); setJobs(data.jobs||[]); }
    } catch {}
  }, [filter]);

  useEffect(() => {
    fetchStats(); fetchJobs();
    addLog("System connected and ready", "success");
    addLog("5 workers initialized — waiting for jobs", "info");
    const iv = setInterval(() => { fetchStats(); fetchJobs(); }, 3000);
    return () => clearInterval(iv);
  }, [fetchStats, fetchJobs]);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

  const handleJobTypeChange = (val) => {
    setJobType(val);
    const t = JOB_TYPES.find(j => j.value===val);
    if (t) setPayload(t.defaultPayload);
  };

  const loadDemo = (scenario) => {
    setJobType(scenario.type);
    setPayload(scenario.payload);
    setPriority(scenario.priority);
    setMaxAttempts(scenario.attempts);
    addLog(`Demo loaded: "${scenario.label}" — click Add Job to Queue`, "warn");
    addToast(`${scenario.label} loaded!`, "success");
  };

  const handleEnqueue = async () => {
    let parsedPayload;
    try { parsedPayload = JSON.parse(payload); } catch { addToast("Payload must be valid JSON", "error"); return; }
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/v1/jobs`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({type:jobType, payload:parsedPayload, priority:parseInt(priority), max_attempts:parseInt(maxAttempts)}),
      });
      const data = await res.json();
      if (res.ok) {
        setLastJob(data.job);
        addToast("Job added to queue successfully!", "success");
        addLog(`New job added → type="${jobType}" id=${shortId(data.job?.id)} priority=${priority}`, "success");
        fetchJobs(); fetchStats();
      } else {
        addToast(data.error||"Failed to add job", "error");
        addLog(`Error: ${data.error}`, "error");
      }
    } catch(e) { addToast("Cannot reach server", "error"); addLog(`Connection error: ${e.message}`, "error"); }
    setLoading(false);
  };

  const currentJobType = JOB_TYPES.find(j => j.value===jobType);

  const statCards = [
    { label:"Total Jobs", value:stats?.total_jobs??"—", color:"var(--text)", desc:"All jobs ever submitted" },
    { label:"Waiting", value:stats?.pending_jobs??"—", color:"var(--warn)", desc:"In queue, not started yet" },
    { label:"Running Now", value:stats?.processing_jobs??"—", color:"var(--accent2)", desc:"Being processed right now" },
    { label:"Completed", value:stats?.completed_jobs??"—", color:"var(--accent)", desc:"Successfully finished" },
    { label:"Retrying", value:stats?.failed_jobs??"—", color:"var(--danger)", desc:"Failed, will retry" },
    { label:"Dead", value:stats?.dead_jobs??"—", color:"var(--purple)", desc:"Max retries exceeded" },
  ];

  return (
    <>
      <header className="header">
        <div className="logo">
          <div className="logo-icon">GQ</div>
          <div>
            <div className="logo-text">Go<span>Queue</span></div>
            <div className="logo-sub">Background Job Processing Engine</div>
          </div>
        </div>
        <div className="header-right">
          <div className="status-pill">
            <div className={`dot ${online===false?"offline":""}`} />
            {online===null?"Connecting…":online?"Server Online":"Server Offline"}
          </div>
          <div className="auto-refresh-label"><div className="refresh-dot"/>Auto-refresh · 3s</div>
        </div>
      </header>

      <main className="main">

        <div className="hero fade-up fade-up-1">
          <div className="hero-tag">▶ LIVE DEMO — BACKEND INTERN PROJECT</div>
          <h1>Job Queue &amp; Worker<br/><span>Engine in Go</span></h1>
          <p>A backend system that handles heavy tasks in the background — so your app stays fast and responsive. Built with Go, PostgreSQL, and Docker.</p>
        </div>

        <div className="explainer fade-up fade-up-1">
          <h2>🤔 What is a Job Queue? (Plain English)</h2>
          <p>
            Imagine you order food online. The app doesn't make you wait while the kitchen cooks — it says "Order Received!" instantly and handles the cooking in the background. A <strong>job queue</strong> works the same way for software. Instead of making a user wait for slow tasks (sending emails, generating reports), we put those tasks in a queue and process them behind the scenes using <strong>background workers</strong>.
          </p>
          <div className="explainer-cards">
            <div className="explainer-card">
              <div className="explainer-card-icon">📥</div>
              <div className="explainer-card-title">Job is Submitted</div>
              <div className="explainer-card-desc">A task (like "send this email") is added to the queue instantly — the user doesn't wait at all.</div>
            </div>
            <div className="explainer-card">
              <div className="explainer-card-icon">⚙️</div>
              <div className="explainer-card-title">Worker Picks It Up</div>
              <div className="explainer-card-desc">One of 5 background workers picks the job and starts processing it automatically.</div>
            </div>
            <div className="explainer-card">
              <div className="explainer-card-icon">✅</div>
              <div className="explainer-card-title">Job Completes or Retries</div>
              <div className="explainer-card-desc">If it succeeds, marked done. If it fails, it automatically retries up to 3 times before giving up.</div>
            </div>
          </div>
        </div>

        <div className="how-it-works fade-up fade-up-2">
          <div className="section-title">How it works — step by step</div>
          <div className="steps-row">
            {[
              {n:"1", label:"You submit a job", sub:"via this UI or any API call"},
              {n:"2", label:"Saved to database", sub:"PostgreSQL stores it safely"},
              {n:"3", label:"Worker picks it up", sub:"Go goroutine processes it"},
              {n:"4", label:"Retry if failed", sub:"Up to 3 attempts automatically"},
              {n:"5", label:"Marked complete", sub:"Result stored in database"},
            ].map((s,i) => (
              <React.Fragment key={i}>
                <div className="step">
                  <div className="step-num">{s.n}</div>
                  <div className="step-label">{s.label}</div>
                  <div className="step-sub">{s.sub}</div>
                </div>
                {i < 4 && <div className="step-arrow">→</div>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <div className="fade-up fade-up-2">
          <div className="section-title">Live Queue Stats</div>
          <div className="stats-grid">
            {statCards.map(s => (
              <div className="stat-card" key={s.label} style={{"--accent-color":s.color}}>
                <div className="stat-label">{s.label}</div>
                <div className="stat-value">{s.value}</div>
                <div className="stat-desc">{s.desc}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="workers-section fade-up fade-up-3">
          <div className="section-title">Background Workers</div>
          <div className="workers-panel">
            <div className="workers-top">
              <div className="workers-top-left">
                <h3>5 Concurrent Workers (Go Goroutines)</h3>
                <p>Each worker is an independent Go goroutine that continuously picks and processes jobs from the queue in parallel.</p>
              </div>
              <div className="auto-refresh-label"><div className="refresh-dot"/>Live</div>
            </div>
            <div className="workers-row">
              {Array.from({length:5}, (_,i) => (
                <div key={i} className="worker-node">
                  <div className={`worker-circle ${activeWorkers[i]?"active":""}`}>W{i}</div>
                  <div className="worker-label">Worker {i}</div>
                  <div className="worker-status">{activeWorkers[i]?"🟢 busy":"⚪ idle"}</div>
                </div>
              ))}
              <div style={{marginLeft:16, fontSize:13, color:"var(--muted)", maxWidth:220, lineHeight:1.6}}>
                <strong style={{color:"var(--text)"}}>Green = processing a job right now</strong><br/>
                Workers run in parallel — 5 jobs can be handled simultaneously.
              </div>
            </div>
          </div>
        </div>

        <div className="two-col fade-up fade-up-3">
          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-title"><div className="panel-title-dot"/>Try It — Add a Job</div>
                <div className="panel-subtitle">Submit a real background task to the live queue</div>
              </div>
            </div>
            <div className="panel-body">

              <div style={{marginBottom:18}}>
                <div className="form-label" style={{marginBottom:8}}>🎯 Quick Demo — Load a Scenario</div>
                <div className="form-hint">Not sure what to fill in? Pick a demo scenario below and hit Add Job.</div>
                <div style={{display:"flex", flexDirection:"column", gap:8, marginTop:8}}>
                  {DEMO_SCENARIOS.map(s => (
                    <button key={s.label} className="btn-demo" onClick={() => loadDemo(s)}>
                      {s.label}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{height:1, background:"var(--border)", margin:"20px 0"}}/>

              <div className="form-group">
                <label className="form-label">What type of task?</label>
                <div className="form-hint">{currentJobType?.desc}</div>
                <select className="form-control" value={jobType} onChange={e=>handleJobTypeChange(e.target.value)}>
                  {JOB_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Task Data (JSON format)</label>
                <div className="form-hint">Information passed to the worker. Pre-filled with a working example — you can edit it freely.</div>
                <textarea className="form-control payload-area" value={payload} onChange={e=>setPayload(e.target.value)} spellCheck={false}/>
              </div>
              <div className="priority-row">
                <div className="form-group">
                  <label className="form-label">Priority</label>
                  <div className="form-hint">Higher priority = processed first.</div>
                  <select className="form-control" value={priority} onChange={e=>setPriority(e.target.value)}>
                    <option value="1">1 — Low</option>
                    <option value="2">2 — Medium</option>
                    <option value="3">3 — High</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Max Retries</label>
                  <div className="form-hint">How many times to retry if it fails.</div>
                  <select className="form-control" value={maxAttempts} onChange={e=>setMaxAttempts(e.target.value)}>
                    <option value="1">1 — No retry</option>
                    <option value="3">3 — Recommended</option>
                    <option value="5">5 — High reliability</option>
                  </select>
                </div>
              </div>
              <button className="btn" onClick={handleEnqueue} disabled={loading||!online}>
                {loading ? <><span className="spinner"/>Adding to queue…</> : "⚡ Add Job to Queue"}
              </button>

              {lastJob && (
                <div className="job-result">
                  <div className="job-result-title">✅ Job added successfully!</div>
                  <div className="job-result-row"><span className="job-result-key">Job ID</span><span className="job-result-val">{lastJob.id}</span></div>
                  <div className="job-result-row"><span className="job-result-key">Type</span><span className="job-result-val">{lastJob.type}</span></div>
                  <div className="job-result-row"><span className="job-result-key">Status</span><span className="job-result-val">pending → will become "completed" in seconds</span></div>
                  <div className="job-result-row"><span className="job-result-key">Priority</span><span className="job-result-val">{PRIORITY_LABELS[String(lastJob.priority)]}</span></div>
                </div>
              )}
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">
              <div>
                <div className="panel-title"><div className="panel-title-dot" style={{background:"var(--accent2)"}}/>All Jobs in the Queue</div>
                <div className="panel-subtitle">Updates automatically every 3 seconds</div>
              </div>
              <div className="filter-tabs">
                {["all","pending","processing","completed","failed"].map(f=>(
                  <button key={f} className={`filter-tab ${filter===f?"active":""}`} onClick={()=>setFilter(f)}>{f}</button>
                ))}
              </div>
            </div>
            <div className="table-scroll">
              {jobs && jobs.length>0 ? (
                <table className="jobs-table">
                  <thead><tr><th>ID</th><th>Task Type</th><th>Status</th><th>Priority</th><th>Tries</th><th>Time</th></tr></thead>
                  <tbody>
                    {jobs.map(job=>(
                      <tr key={job.id}>
                        <td><span className="job-id">{shortId(job.id)}</span></td>
                        <td><span className="job-type">{job.type}</span></td>
                        <td><span className={`badge ${job.status}`}>{job.status}</span></td>
                        <td><span className={`priority-badge priority-${job.priority}`}>{job.priority}</span></td>
                        <td style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--muted)"}}>{job.attempts}/{job.max_attempts}</td>
                        <td style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--muted)"}}>{formatTime(job.created_at)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <div className="empty-state">
                  <div className="empty-icon">📭</div>
                  <div>Queue is empty</div>
                  <div style={{marginTop:6,fontSize:11}}>Load a demo scenario on the left and click Add Job</div>
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="log-panel fade-up fade-up-4">
          <div className="panel-header">
            <div>
              <div className="panel-title"><div className="panel-title-dot" style={{background:"var(--warn)"}}/>System Activity Log</div>
              <div className="panel-subtitle">Real-time log of all system events</div>
            </div>
            <button className="btn-secondary" onClick={()=>setLogs([])}>Clear</button>
          </div>
          <div className="log-body" ref={logRef}>
            {logs.map((l,i)=>(
              <div key={i} className="log-entry">
                <span className="log-time">{l.time}</span>
                <span className={`log-msg ${l.type}`}>{l.msg}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="usecases fade-up fade-up-4">
          <div className="section-title">Real World Use Cases</div>
          <div className="usecases-grid">
            <div className="usecase-card">
              <div className="usecase-icon">🛒</div>
              <div className="usecase-title">E-Commerce Orders</div>
              <div className="usecase-desc">When a customer places an order, 8 things happen in the background — confirmation email, inventory update, warehouse ping, payment settlement — all via job queues.</div>
              <div className="usecase-example">job: "send_order_confirmation"</div>
            </div>
            <div className="usecase-card">
              <div className="usecase-icon">🏦</div>
              <div className="usecase-title">Banking & Payments</div>
              <div className="usecase-desc">Razorpay, PayPal, and Stripe all use job queues to process millions of payment webhooks and transaction notifications without slowing down the main app.</div>
              <div className="usecase-example">job: "webhook_delivery"</div>
            </div>
            <div className="usecase-card">
              <div className="usecase-icon">📊</div>
              <div className="usecase-title">Analytics & Reports</div>
              <div className="usecase-desc">Generating a report that crunches millions of rows takes time. Queue it as a background job — the user gets notified when it's ready instead of waiting.</div>
              <div className="usecase-example">job: "generate_report"</div>
            </div>
          </div>
        </div>

        <div className="tech-section fade-up fade-up-5">
          <div className="section-title">Tech Stack</div>
          <div className="tech-grid">
            {["Go 1.21","Gin Framework","PostgreSQL 15","Goroutines & Channels","Docker","Render (Cloud)","REST API","Dead Letter Queue","Exponential Backoff Retry","Priority Scheduling"].map(t=>(
              <div key={t} className="tech-chip"><div className="tech-chip-dot"/>{t}</div>
            ))}
          </div>
        </div>

      </main>

      <footer className="footer">
        <div className="footer-text">
          GoQueue — Production-grade Background Job Processing Engine<br/>
          Built with Go · Gin · PostgreSQL · Docker · Deployed on Render<br/>
          <a href="https://github.com/debasmita30/go-job-queue" target="_blank">github.com/debasmita30/go-job-queue</a>
          {" · "}
          <a href={`${API}/health`} target="_blank">API Health Check</a>
          {" · "}
          <a href={`${API}/api/v1/stats`} target="_blank">Live Stats JSON</a>
        </div>
      </footer>

      <div className="toast-container">
        {toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>{t.type==="success"?"✓":"✗"} {t.msg}</div>
        ))}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
